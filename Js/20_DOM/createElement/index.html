<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div class="parent">
        <div class="day">Monday</div>
        <div class="day">Tuesday</div>
        <div class="day">Wednesday</div>
        <div class="day">Thrusday</div>
        <div class="day">Friday</div>
        <div class="day">Saturday</div>
        <div class="day">Sunday</div>
        <!--THis is the coment that is also included in the childNode-->
        
    </div>
    <script>
        const parent = document.querySelector(".parent");
        console.log(parent);
        console.log(parent.children) // gives the HTML Collection(index:div)
        console.log(parent.children[0].innerHTML) // Monday

        for(let i =0; i<parent.children.length; i++){
            console.log(parent.children[i].innerHTML);
        }
        parent.children[0].style.color = 'Red'; //(monday--> textColor=red)
        console.log(parent.firstElementChild);
        console.log(parent.lastElementChild);

        const firstChild=parent.firstElementChild;
       const day1 = document.querySelector(".day"); // gives the first element
       console.log("day: ",day1)
       console.log(day1.parentElement)
       console.log(day1.parentNode);
       console.log("NextSibligs:",day1.nextElementSibling) // give the next siblings of the day1(<div class="day">Tuesday</div>)

       console.log("Nodes: ",parent.childNodes) // this will return the every child of parent (include, elemets,txt nodes, comments).
    </script>
</body>
</html>
