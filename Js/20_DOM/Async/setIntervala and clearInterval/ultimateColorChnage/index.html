<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body style="background-color: #212121; color:#fff">
    <h1>Start should chnage the background color every second</h1>

    <button id="start">Start</button>
    <button id="stop">Stop</button>

    <script>
        const randomColor = function () {
            const hex = "0123456789ABCDEF";
            let color = "#";
            for (let i = 0; i < 6; i++) {
                color += hex[Math.floor(Math.random() * 16)];
            }
            return color;
        };
        let intervalID;
        const startChnagingColor = function () {
            if (!intervalID) {
                intervalID = setInterval(function () {
                    document.body.style.backgroundColor = randomColor();
                }, 1000)
            }
        };
        const stopChnagingColor = function () {
            clearInterval(intervalID);
            intervalID = null;
        }


        document.getElementById("start").addEventListener("click", startChnagingColor)

        document.getElementById("stop").addEventListener("click", stopChnagingColor)
    </script>
</body>

</html>
