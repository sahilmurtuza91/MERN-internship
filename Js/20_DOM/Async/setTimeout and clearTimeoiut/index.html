<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Async</title>
</head>
<body>
    <h1 id="heading">learnig Async</h1>
    <button id="stop">Stop</button>

    <script>
        // setTimeout(function(){
        //     console.log("Sahil Muruza")
        // },2000)
        function sayName(){
            console.log("Sahil Murtuza");
        }
        const chnaeMe = setTimeout(sayName,2000);// here we not use () paranthesis because this fumction is handler not so that we don't use the paranthesis()(and this pass the function reference).

        function changeColor(color){
            const head = document.getElementById("heading");
            head.style.backgroundColor = color;
            head.style.color = "white";
        }
        setTimeout(()=>{
            changeColor("blue")
        },2000)

        // clear timeout
        document.getElementById("stop").addEventListener("click",function(){
            clearTimeout(chnaeMe);
            console.log("Stopped");
        })
    </script>
</body>
</html>
