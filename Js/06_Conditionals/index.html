<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>conditional</title>
</head>
<body>
    <h2>This is if else..</h2>

    <p id="demo"></p>
    <p id="demo1"></p>
    <p id="demo2"></p>
    <p id="day"></p>

    <script>
        const time = new Date().getHours();
        let greeting;
        if (time < 10) {
        greeting = "Good morning";
        } else if (time < 20) {
        greeting = "Good day";
        } else {
        greeting = "Good evening";
        }
        document.getElementById("demo").innerHTML = 'Time is '+time+" "+ greeting;



        let text;
        if(Math.random()<0.5){
            text= "<a href='https://w3schools.com'>Visit W3Schools</a>";
        }
        else{
            text =  "<a href='https://wwf.org'>Visit WWF</a>";
        }
        document.getElementById("demo1").innerHTML = text;

// Ternary operators
        let age = Math.floor(Math.random()*100);
        let text1 = (age>=18)?"Eligible for vote":"Not Eligible for vote"
        document.getElementById("demo2").innerHTML ="age :"+age+" -->"+ text1

// Switch control flow
        let day = new Date().getDay();
        switch(day){
            case 0: day = "Sunday";
                break;
            case 1: day = "Monday";
                break;
            case 2: day = "Tuesday";
                break;
            case 3: day = "Wednesday";
                break;
            case 4: day = "Thrusday";
                break;
            case 5: day = "friday";
                break;
            case 6: day = "saturday";
                break;
            default:
                day = "Looking forward to the Weekend";
        }
        document.getElementById("day").innerHTML = "Today is "+ day;

// Blloean
console.log("\n printing the boolean")
let x= false;
console.log(typeof x); // blloean

// Boolean can also be defined as object with the keyword new
let y = new boolean(false);
console.log("\n"+ typeof y) // objcet
    </script>
</body>
</html>
