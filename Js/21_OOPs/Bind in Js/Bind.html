<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <button>Button Clicked</button>

    <script>
        class React{
            constructor(){
                this.library = "React";
                this.server = "http://localhost:300";

                // requirement
                document.querySelector('button').addEventListener('click', this.handleClick.bind(this))
                // bind() creates a new function where this is permanently set to your class instance (React object).
            }
            handleClick(){
                console.log("button Clicked");
                console.log(this);
            }
        }
        const app = new React();
        // bind() is used to fix (lock) the value of this inside a function.
       
    </script>
</body>
</html>
