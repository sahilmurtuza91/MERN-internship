<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <h1>JavaScript String</h1>
    <h2>The charAt() Method</h2>

    <p>The charAt() method returns the character at a given position in a string:</p>

    <p id="demo"></p>

    <script>
        let text = "Hello World";
        document.getElementById("demo").innerHTML = `Charatcter Index ${text.charAt(0)} and the character code is ${text.charCodeAt(0)} and the chode point is  ${text.codePointAt(0)}`;

    </script>
</body>

</html>
