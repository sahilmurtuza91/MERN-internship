<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Where to use the JavaScript</title>
    <!-- Or We  can also use the js in the head 
     <script>
        document.getElementsByClassName("demo")[1].innerHTML = "This is the another html paragraph added by the js Using inside the header"
     </script> -->
</head>
<body>
    <h1>Here We learn Where we have to use the js</h1>
    <p class="demo"></p>
    <p class="demo"></p>
    <script>
        document.getElementsByClassName("demo")[0].innerHTML = "JavaScript this paragraph is inserted by the help of Js"
    </script>

    <!--Or we can also use the Js as a external that is <script src=""></script>-->
    
</body>
</html>
