<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /* *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        } */
        .main-box{
            width: 100vw;
            height: 100vh;
            background-color: blue;
            display: flex;
            flex-direction: row;
            flex-wrap: wrap;
            align-items: center;
            
        }
        .box{
            width: 200px;
            height: 150px;
            background-color: lightgray;
            border: 2px solid black;
            margin: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .box p{
            font-size: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="main-box">
        <div class="box"><p>Box 1</p></div>
        <div class="box"><p>Box 2</p></div>
        <div class="box"><p>Box 3</p></div>
        <div class="box"><p>Box 4</p></div>
        <div class="box"><p>Box 5</p></div>
        <div class="box"><p>Box 6</p></div>
        <div class="box"><p>Box 7</p></div>
        <div class="box"><p>Box 8</p></div>
        <div class="box"><p>Box 9</p></div>
        <div class="box"><p>Box 10</p></div>
    </div>
</body>
</html>
