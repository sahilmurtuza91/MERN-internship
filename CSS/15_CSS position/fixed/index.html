<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>fixed position property</title>
    <style>
        body{
            background-color: aqua;
        }
        .first-div{
            width: 100%;
            height: 1000px;
            background-color: black;
            color: white;
        }
        .fixed-box{
            height: 200px;
            width: 200px;
            position: fixed;
            left: 300px;
            top: 350px;
            background-color: blue;
            color: white;
        }
        .second-div{
            background-color: beige;
            width: 100%;
            height: 1000px;
        }
        .div{
            height: 200px;
            width: 200px;
            border: 2px solid black;
            margin: 2px;
            color: white;
        }
    </style>
</head>
<body>
    <div class="first-div">
        <div class="fixed-box">
            <p>This is the fixed box</p>


        </div>
    </div>
        
    <div class="second-div">
        <p>this is not the fixed box</p>
        <div class="div" style="background-color: red;">red</div>
        <div class="div" style="background-color: green;">green</div>
        <div class="div" style="background-color: yellow;">yellow</div>
        <div class="div" style="background-color: blue;">blue</div>
    </div>
</body>
</html>
