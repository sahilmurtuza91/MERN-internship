<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Absolute Position property</title>
    <style>
        *{
            margin: 5px;
            padding: 0;
        }
        .relative-box{
            position: relative;
            top: 20px;
            left: 20px;
        }
        .box{
            width: 200px;
            height: 200px;
            margin: 2px;
            border: 2px solid black;
            color: white;
        }
        .box2{
            position: absolute;
            left: 50px;
            top: 180px;
        }
    </style>
</head>
<body>
    <h1>CSS Position property</h1>

    <div class="relative-box">
        <div class="box1 box" style="background-color: aqua;"><p>Box1</p></div>
        <div class="box2 box" style="background-color: black;"><p>Box2</p></div>
        <div class="box3 box" style="background-color: blue;"><p>Box3</p></div>
        <div class="box4 box" style="background-color: rebeccapurple;"><p>Box4</p></div>
    </div>
</body>
</html>
