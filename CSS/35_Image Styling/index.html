<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .first-section img {
            height: 10rem;
            width: 10rem;
            border-radius: 50%;
        }

        .first-section:hover {
            height: 10rem;
            width: 10rem;
            box-shadow: 0 4px 8px 0 rgba(0, 0, 0, 0.2), 0 6px 20px 0 rgba(0, 0, 0, 0.19);
        }

        .img-gal {
            display: flex;
            flex-wrap: wrap;
            margin: 5px;

        }

        .gal {
            height: 15rem;
            width: 15rem;
            padding: 8px 0;
            margin: 10px;
            border: 2px solid #CCC;
            border-radius: 6px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .img-gal img {
            height: 12rem;
            width: 14rem;
            border-radius: 5px;
        }

        .img-gal img:hover {
            cursor: pointer;
            box-shadow: 0 4px 8px 0 rgba(0, 0, 0, 0.2), 0 6px 20px 0 rgba(0, 0, 0, 0.19);
            transform: scaleX(-1);
            transform:scale(1.1);
        }

        p:hover {
            color: red;
        }

        .container{
            position: relative;
            width: 50%;
        }
        .image{
            display: block;
            width: 100%;
            height: auto;
        }
        .overlay{
            position: absolute;
            left: 0;
            right: 0;
            bottom: 0;
            width: 100%;
            background-color:  #008CBA;
            overflow: hidden;
            transition-property: all;
            transition-duration: 0.5s;
            transition-timing-function: ease;
            height: 0;
        }
        .container:hover .overlay{
            height: 100%;
        }
        .text{
            color: white;
            font-size:20px;
            position: absolute;
            overflow: hidden;
            top: 45%;
            left: 30%;
            transform: rotate(-50% -50%);
        }
    </style>
</head>

<body>
    <section class="first-section">
        <img src="https://www.w3schools.com/css/img_5terre_wide.jpg" alt="nature">
    </section>

    <section>
        <h2>Image Gallery</h2>
        <div class="img-gal">

            <div class="gal">
                <img src="https://www.w3schools.com/css/img_5terre.jpg" alt=" nature1" class="img1">
                <p>Cinque Terre</p>
            </div>

            <div class="gal">
                <img src="https://www.w3schools.com/css/img_forest.jpg" alt="nature2">
                <p>Green Forest</p>
            </div>
            <div class="gal">
                <img src="https://www.w3schools.com/css/img_lights.jpg" alt="nature3">
                <p>Northern Lights</p>
            </div>
            <div class="gal">
                <img src="https://www.w3schools.com/css/img_mountains.jpg" alt="natur4">
                <p>Mountains</p>
            </div>
        </div>
    </section>

    <section>
        <h2>Slide in Overlay from the Bottom</h2>

        <div class="container">
            <img src="https://www.w3schools.com/w3css/img_avatar3.png" alt="Avatar" class="image" >
            <div class="overlay">
                <div class="text">Hello World</div>
            </div>
        </div>
    </section>
</body>

</html>
