<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <titleCSS Image Filter Effects</title>
        <style>
            img{
                width: 350px;
                height: auto;
                margin: 10px;
            }
            .img-blur{
                filter: blur(20%);
            }
            .img-brightness{
                filter: brightness(50%);
            }
            .img-contrast{
                filter: contrast(30%);
            }
            .img-drop-shadow{
                filter: drop-shadow(10px 10px 7px lightblue);
            }
            .img-grayscale{
                filter: grayscale(60%);
            }
            .img-hue-rotate{
                filter: hue-rotate(90deg);
            }
            .img-invert{
                filter: invert(70%);
            }
            .img-opacity{
                filter: opacity(40%);
            }
            .img-saturate{
                filter: saturate(200%);
            }
            .img-sepia{
                filter: sepia(60%);
            }
        </style>
</head>
<body>
    <h1>CSS Image Filter Effects</h1>
    <hr>
    <p><b>This is the Original Image</b></p>
    <img src="https://www.w3schools.com/css/pineapple.jpg" alt="" >
    <hr>
    <div>
        <h2>blur()</h2>
        <img src="https://www.w3schools.com/css/pineapple.jpg" alt="" class="img-blur">
    
    </div>
    <div>
        <h2>brightness()</h2>
        <img src="https://www.w3schools.com/css/pineapple.jpg" alt="" class="img-brightness">
    
    </div>
    <div>
        <h2>contrast()</h2>
        <img src="https://www.w3schools.com/css/pineapple.jpg" alt="" class="img-contrast">
    
    </div>
    <div>
        <h2>drop-shadow()</h2>
        <img src="https://www.w3schools.com/css/pineapple.jpg" alt="" class="img-drop-shadow">
    
    </div>
    <div>
        <h2>grayscale()</h2>
        <img src="https://www.w3schools.com/css/pineapple.jpg" alt="" class="img-grayscale">
    
    </div>
    <div>
        <h2>hue-rotate()</h2>
        <img src="https://www.w3schools.com/css/pineapple.jpg" alt="" class="img-hue-rotate">
    
    </div>
    <div>
        <h2>invert()</h2>
        <img src="https://www.w3schools.com/css/pineapple.jpg" alt="" class="img-invert">
    
    </div>
    <div>
        <h2>opacity()</h2>
        <img src="https://www.w3schools.com/css/pineapple.jpg" alt="" class="img-opacity">
    
    </div>
    <div>
        <h2>saturate()</h2>
        <img src="https://www.w3schools.com/css/pineapple.jpg" alt="" class="img-saturate">
    
    </div>
    <div>
        <h2>sepia()</h2>
        <img src="https://www.w3schools.com/css/pineapple.jpg" alt="" class="img-sepia">
    
    </div>
</body>
</html>
