<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Colors</title>
    <style>
        *{
            margin: 0px;
            padding: 0px;
        }
        h1,p{
            margin: 20px;
            text-align: center;
            padding: 5px;
        }
    </style>
</head>
<body>
    <h1 style="background-color: dodgerblue; color: wheat;">Hello World</h1>
    <p style="background-color: tomato; border: 2px solid black;">Lorem, ipsum.</p>
</body>
</html>
