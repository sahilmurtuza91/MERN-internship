<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HSl Color model</title>
    <style>
        body{
            background-color: hsl(248, 53%, 58%);
        }
        table,td,th{
            border: 2px solid hsl(0, 100%, 0%);
            color: hsl(0, 100%, 100%)
;
        }

        tr:nth-child(even){
            background-color: hsl(0, 100%, 50%);
        }

    </style>
</head>
<body>
    <h1 style="color: hsl(0, 100%, 100%)
;">HSL stands for hue, saturation, and lightness.</h1>
<hr>
        <table>
        <caption>Information</caption>
        <tr>
            <th>Name</th>
            <th>Age</th>
            <th>Country</th>
        </tr>
        <tr>
            <td>Harry Depp</td>
            <td>28</td>
            <td>Britain</td>
        </tr>
        <tr>
            <td>John Smith</td>
            <td>35</td>
            <td>USA</td>
        </tr>
        <tr>
            <td>Raju kumar</td>
            <td>19</td>
            <td>Nepal</td>
        </tr>
    </table>
</body>
</html>
