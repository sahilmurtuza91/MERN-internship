<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Grouping Selectors</title>
    <style>
        /* universal Selector:-> Select all HTML element on the page
        */
        *{
            box-sizing: border-box;
            background-color: aqua;
        }
        h1,h2,p{
            text-align: center;
            color: blue;
        }
    </style>
</head>
<body>
    <h1>CSS Grouping Selector</h1>
    <h2>here we uses the different way of selecting the html elements</h2>
    <p>Hello!</p>
</body>
</html>
