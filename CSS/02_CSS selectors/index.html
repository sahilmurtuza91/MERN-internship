<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Selectors</title>
    <style>
        body{
            background-image: url(https://thumbs.dreamstime.com/b/night-reflections-4484268.jpg?w=576);
            background-size: cover;
            background-repeat: no-repeat;
            background-attachment: fixed;
        }
        #para1{
            color: white;
            font-size: 20px;
        }
        .para2{
            color: rgb(202, 79, 81);
            font-size: 16px;
        }

    </style>
</head>
<body>
    <!-- Selectors are use to find or select the HTML element.-->
    <h1>CSS Selectors</h1>
    <p>Here we are going to learn the css properties.</p>
    <div id="para1">
        <p>This is the first paragraph.</p>
    </div>
    <div class="para2">
        <p>This is the second paragraph.</p>
</body>
</html>
