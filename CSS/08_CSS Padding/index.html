<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Padding</title>
    <style>
        *{
            box-sizing: border-box;
        }
        body{
            background-color: aqua;
            padding: 0;
            margin: 0;
        }
        div{
            background-color: brown;
            padding: 30px;
        }
        h3{
            padding: 30px;
            background-color: blueviolet;
            
        }
    </style>
</head>
<body>
    <h1>CSS Padding</h1>
    <div>
        <h3>Here we are using the padding</h3>
    </div>
</body>
</html>
