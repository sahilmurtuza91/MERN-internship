<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Display</title>
    <style>
        .card{
            display: inline-block;
            height: 200px;
            width: 200px;
            background-color: pink;
            border: 2px solid black;
        }
        .card3{
            display: none;
        }
        .span-card{
            height: 200px;
            width: 200px;
            background-color: pink;
            border: 2px solid black;
            display: block;
            margin: 2px;
        }
    </style>
</head>
<body>
    <div class="card">Card1</div>
    <div class="card">card2</div>
    <div class="card3" style="width: 200px; height: 200px; background-color: pink;">card3</div>

    <span class="span-card">span-card1</span>
    <span class="span-card">span-card2</span>
</body>
</html>
