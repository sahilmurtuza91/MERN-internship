<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div{
            width: 300px;
            margin: auto;
            height: 300px;
            background-color: red;
            text-align: center;
            outline-style: groove;
            outline-offset: 15px;
            outline-color: aqua;
            outline-width: 20px;
        }
    </style>
</head>
<body>
    <div>
    <p>An outline is a line drawn around an element, outside the element's border.</p>
    <p>This element has a black border and a green outline with a width of 10px.</p>
    </div>
</body>
</html>
