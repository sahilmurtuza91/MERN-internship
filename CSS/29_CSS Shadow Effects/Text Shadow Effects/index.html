<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Shadow</title>
    <style>
        h1{
            text-shadow: 2px 2px; /*Horizontal and vertical shadow*/
        }
        h2{
            text-shadow: 2px 2px red;
        }
        h3{
            text-shadow: 2px 2px 5px red;
        }
    </style>
</head>
<body>
    <h1>Horizontal and vertical shadow</h1>
    <h2>Horizontal and vertical shadow, with color</h2>
    <h3>Horizontal and vertical shadow, with color and blur effect</h3>
</body>
</html>
