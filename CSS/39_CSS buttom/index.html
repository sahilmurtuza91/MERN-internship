<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buttom style</title>
    <style>
        
            .btn-1{
                background-color: red;
                border: none;
                border-radius: 5px;
                color:white;
                padding: 15px 32px;
                text-align: center;
                display: inline-block;
                font-size: 16px;
                cursor: pointer;
                transition-duration: .4s;
            }
            .btn-1:hover{
                background-image: linear-gradient(to right, red, green);
            }
            .btn-2{
                background-color: red;
                opacity: 0.4;
                border: none;
                border-radius: 5px;
                color: white;
                text-align: center;
                padding: 15px 32px;
                font-size: 16px;
                display: inline-block;
                cursor: no-drop;
            }
        
    </style>
</head>
<body>
    <div>
        <button type="button" class="btn-1">Button-1 </button>

        <button type="submit" class="btn-2">Buttom-2</button>
    </div>
</body>
</html>
