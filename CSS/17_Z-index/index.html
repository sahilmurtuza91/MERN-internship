<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box{
            height: 200px;
            width: 200px;
            border: 2px solid black;
            margin: 2px;
            position: absolute;
        }
        .red{
            background-color: red;
            top: 50px;
            left: 70px;
            z-index: 1;
        }
        .blue{
            background-color: blue;
            top: 100px;
            left: 120px;
            z-index: 2;
        }
    </style>
</head>
<body>
    <!--z-index in CSS controls which element appears on top when elements overlap.-->
    <div class="box red">red first box z-index value 1</div>
    <div class="box blue">blue second box z-index value 2</div>
</body>
</html>
