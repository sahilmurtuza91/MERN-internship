<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Colspan & Rowspan</title>
    <style>
        table,td,th{
            border: 2px solid black;
            background-color: lightgray;
            border-collapse: collapse;
            padding: 5px;
        }
    </style>
</head>
<body>
    <table>
        <caption>Colspan & Rowspan</caption>
        <tr>
            <th rowspan="3">Row 1,2,3</th>
            <th colspan="2">Column 1 & 2</th>
        </tr>
        <tr>
            <td rowspan="2">Item A</td>
            <td rowspan="2">Item B</td>
        </tr>
        <tr>
            <!-- This row is intentionally left empty to demonstrate rowspan -->
        </tr>
    </table>
</body>
</html>
