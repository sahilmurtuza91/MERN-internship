<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Base</title>

    <!-- The <base> tag is used to:
    Set the main (base) URL for all relative links in the webpage.
    Set the default target for all <a> links (like opening links in a new tab). -->

    <base target="_blank">

</head>
<body>
    <div>
        <h1>Here we are going to use the base tag that is to provide a default target for all links in the document</h1>

        <a href="https://www.google.com">Link 1</a>
        <a href="https://www.github.com">Link 2</a>
        <a href="https://www.stackoverflow.com">Link 3</a>
    </div>
</body>
</html>
