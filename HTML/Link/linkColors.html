<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Link Colors</title>
    <style>
        a:link{
            color:red;
            background-color: transparent;
            text-decoration: none;
        }
        a:visited{
            color:green;
            background-color: transparent;
            text-decoration: none;
        }
        a:hover{
            color:pink;
            background-color: transparent;
            text-decoration: none;
        }
        a:active{
            color: blue;
            background-color: transparent;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <!-- By default, links are blue and underlined
        we can also chnage the color or state of the likn by using the css properties
    -->

    <a href="https://www.google.com/" target="_blank" title="Google.com">Google</a> <br>
    <a href="https://www.linkedin.com/" target="_parent" title="linkedin.com">Linkedin</a> <br>
    <a href="https://www.youtube.com/" target="_top" title="youtube.com">Youtube</a>

</body>
</html>
