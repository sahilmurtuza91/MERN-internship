<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML link</title>
</head>
<body>
    <a href="https://www.google.com/">Google</a>
    <p>This is the first paragarph</p>

    <a href="https://www.facebook.com/">Facebook</a>


    <!--By default, the linked page will be displayed in the current browser window. To change this, you must specify another target for the link. and this target is assosicated with many form-
    
    _self:-> by defult it open the link in the same window
    _blank:-> it open the link in the new window
    _parent:-> it open the link in the parent frame
    _top:-> it open the link in the full body of the window
-->

    <h2>Here we are using the target attribute</h2>
    <a href="https://www.google.com/" target="_blank">Google</a>
    <a href="https://www.facebook.com/" target="_parent">facebook</a>
    <a href="https://www.youtube.com" target="_top" title="Open Youtube">YouTube</a>
    <p id="para">This is the second paragarph</p>
    
</body>
</html>
