<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        img{
            width: 100%;
            
            /*The above width will strech image to fill the whole page wheather the size of the image is small or big*/

            /* But when we use the property max-width:100%  then in that case it will only strech the image upto its full width not its beyond width*/

            /*
            max-width: 100%;
            height: auto;

            this help to make the image not strach more then it's parent container or not streach more then it's original size and height will be auto to maintain the aspect ratio of the image.
             */
        }
    </style>
</head>
<body>
    <img src="../images/sun.jpg" alt="Sun">
</body>
</html>
