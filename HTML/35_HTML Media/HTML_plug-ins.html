    <h1>HTML Plug-ins</h1>
    <!--
    <object> Element
    The <object> element is used to embed multimedia, such as audio, video, Java applets, ActiveX, PDF, and Flash. It can also be used to embed other types of content, such as HTML documents.
    -->
    <h2>Using the object element to embed a PDF file:</h2>
    <object  width="350px" height="200px" data="../35_HTML Media/HTML_Video.html" type="video/mp4"></object>

    <!--
    <embed> Element
    the <embed> element is used to embed multimedia content, such as audio, video, and Flash. It is similar to the <object> element but is more widely supported by browsers. it mainly used to embed the media files like audio and video.
    -->
    <h2>Using the embed element to embed a video:</h2>
    <embed src="../Video/firstvido.mp4"  type="video/mp4" width="350px" height="200px">
