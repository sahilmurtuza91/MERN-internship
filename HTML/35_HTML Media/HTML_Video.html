<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Video</title>
</head>

<body>
    <h1>HTML Video</h1>
    <!-- <video src=""></video> -->
    <h3>using the controls</h3>
    <video width="350px" height="350px" controls>
        <source src="../Video/secondvideo.mp4" type="video/mp4">
        <source src="../Video/firstvido.mp4" type="video/mp4">
        Your browser does not support the video tag.
    </video>
    <br>
    <!--using autoplay-->
    <h3>using autoplay</h3>
    <video width="350px" height="350px" autoplay>
        <source src="../Video/secondvideo.mp4" type="video/mp4">
        <source src="../Video/firstvido.mp4" type="video/mp4">
        Your browser does not support the video tag.
    </video>
    <br>
    <!--using autoplay with mute-->
    <h3>using autoplay with mute</h3>
    <video width="350px" height="350px" autoplay muted>
        <source src="../Video/secondvideo.mp4" type="video/mp4">
        <source src="../Video/firstvido.mp4" type="video/mp4">
        Your browser does not support the video tag.
    </video>
</body>

</html>
