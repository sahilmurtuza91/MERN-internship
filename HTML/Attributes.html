<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attributest</title>
</head>
<body>
    <!-- Attribtes are used to provide the additional information abute the element. and this is alway specified within the opening tag -->

    <a href="https://www.w3schools.com/html/html_attributes.asp">W3Schools</a>
    <br>

    <!-- src->> attribute is used to specify the URL of an image. -->

    <!-- this is Absolute path -->
    <img src="https://media.istockphoto.com/id/607280514/photo/lupins-of-lake-tekapo.jpg?s=612x612&w=0&k=20&c=TLqHmSwcHKT1wR6U7H1KCJMmIq3SrgqHNOEyvziSCSg=" alt=" Absolute Image" width="100px" height="100px"> 

    <!-- this is Relative path -->
    <img src="images/sun.jpg" alt="Relative Image" width="100px" height="100px">

    <!-- style->> attribute is used to specify the inline CSS for an element. -->

    <p style="background-color: aqua;"> Lorem ipsum dolor sit amet consectetur adipisicing elit. Accusamus atque quam, autem ipsam cumque, quod officiis maxime dicta, modi magni labore eligendi necessitatibus laudantium sit! Dolorem expedita fugit delectus ab.</p>

    <!-- title->> attribute is used to add extra information about the element and this is shown by hover the mouse over the element. -->

    <p title="This is a tooltip">Hover over me!</p>
</body>
</html>
