<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table Style</title>
    <style>
            .first-table tr:nth-child(even){
                background-color: #D6EEEE;
            }
            .second-table th:nth-child(odd), .second-table td:nth-child(odd){
                background-color: #D6EEEE;
            }
            .third-table tr:hover{
                background-color: #D6EEEE;
            }
            .third-table{
                border: 2px solid #D6EEEE;
                border-spacing: 20px;
                
            }


 
    </style>
</head>

<body>
    <table class="first-table">
        <tr>
            <th>Name</th>
            <th>Age</th>
            <th>Country</th>
        </tr>
        <tr>
            <td>Harry Depp</td>
            <td>28</td>
            <td>Britain</td>
        </tr>
        <tr>
            <td>John Smith</td>
            <td>35</td>
            <td>USA</td>
        </tr>
        <tr>
            <td>Raju kumar</td>
            <td>19</td>
            <td>Nepal</td>
        </tr>
    </table>
    <br><hr>
    <!--for the vertical coloring-->

    <table class="second-table">
        <tr>
            <th>Name</th>

        <tr>

            <td>19</td>

    </table>
    <br><hr>

    <!-- this is used fo the hover of the table-->

        <table class="third-table">

        </tr>

</body>

</html>
