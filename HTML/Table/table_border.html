<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Table</title>
    <style>
        .first-table table,
        .first-table td,
        .first-table th {
            border: 1px solid white;
        }

        .first-table td,
        .first-table th {
            background-color: lightgray;
            padding: 5px;
        }

        .second-table td,
        .second-table th {
            border: 1px solid black;
            border-radius: 15px;
            padding: 7px;

        }
    </style>
</head>

<body>
    <div class="first-table">
        <table>
            <tr>
                <th>Name</th>
                <th>Age</th>
                <th>Country</th>
            </tr>
            <tr>
                <td>Harry Depp</td>
                <td>28</td>
                <td>Britain</td>
            </tr>
            <tr>
                <td>John Smith</td>
                <td>35</td>
                <td>USA</td>
            </tr>
            <tr>
                <td>Raju kumar</td>
                <td>19</td>
                <td>Nepal</td>
            </tr>
        </table>
    </div>

    <div class="second-table">
        <table>
            <tr>
                <th>Name</th>
                <th>Age</th>
                <th>Country</th>
            </tr>
            <tr>
                <td>Harry Depp</td>
                <td>28</td>
                <td>Britain</td>
            </tr>
            <tr>
                <td>John Smith</td>
                <td>35</td>
                <td>USA</td>
            </tr>
            <tr>
                <td>Raju kumar</td>
                <td>19</td>
                <td>Nepal</td>
            </tr>
        </table>
    </div>
</body>

</html>
