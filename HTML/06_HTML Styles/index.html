<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Styles</title>
</head>
<body>
    <h1 style="background-color: powderblue;">This is the first heading</h1>
    <h2 style="background-color: tomato;">This is second heading.</h2>

    <p style="color: blue;">This is first paragraph.</p>

    <p style="font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;">This helps to add the the font family</p>

    <p style="font-size: 8rem;">This set the font size</p>

    <p style="font-weight: 1000;">This help to set the font weight</p>

    <!-- text-align is a CSS property used to control the horizontal alignment of text inside an element. -->
    <p style="text-align: end;">Ceneter paragraph</p>
</body>
</html>
