<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive using picture</title>
    <style>
        .left, .right{
            float: left;
            width: 20%;
            height: 50px;
        }
        .main{
            float: left;
            width: 60%;
            height: 50px;
        }
        @media screen and (max-width:600px){
            .left,.right,.main{
                float: left;
                width: 100%;
                height: 50px;
            }
        }

    </style>
</head>
<body>
    <picture>
        <source srcset="../images/lap.jpg" media="(min-width:650px)">
        <source srcset="../images/sun.jpg" media="(min-width:450px)">
        <img src="https://thumbs.dreamstime.com/b/night-reflections-4484268.jpg?w=576" alt="Nature">
    </picture>

    <hr>

    <p class="left" style="background-color: red;">Left menu</p>
    <p class="main" style="background-color: blue;">Main menu</p>
    <p class="right" style="background-color: green;">Right menu</p>
    

    <!--Here we are using the <figure> and <figcaption> code-->
        <figure>
            <img src="../images/lap.jpg" alt="Laptop">
            <figcaption>This is the image of the laptop</figcaption>
        </figure>
</body>
</html>
