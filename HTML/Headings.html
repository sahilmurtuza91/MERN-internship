<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Headings</title>
</head>
<body>
    <!-- Headings are used to define the importance of a section in the document. And it takes white space before and after a heading -->
    <h1>This is the first Heading.</h1>
    <h2>This is the second Heading.</h2>
    <h3>This is the third Heading.</h3>
    <h4>This is the fourth Heading.</h4>
    <h5>This is the fifth Heading.</h5>
    <h6>This is the sixth Heading.</h6>
</body>
</html>
