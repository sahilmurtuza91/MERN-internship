<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Entities</title>
    <style>
        tr:nth-child(even){
            background-color: lightgray;
        }
        tr:nth-child(odd){
            background-color: rgb(240, 235, 235);
        }
        table{
            width: 60%;
            table-layout: fixed;
        }
        tr:hover{
            background-color: #D6EEEE;
        }
    </style>
</head>

<body>
    <!--HTML Entities are used to display reserved characters in HTML.
    For example, the less than symbol (<) is a reserved character in HTML, and it is used to define tags. If you want to display the less than symbol on a webpage, you need to use the HTML entity &lt; instead of <.-->

    <h1>Some Useful HTML Character Entities</h1>
    <table>
        <caption>HTML Character Entities</caption>
        <tr>
            
            <th>Description</th>
            <th>Name</th>
            <th>Number</th>
        </tr>
        <tr>
            
            <td>non-breaking</td>
            <td>&nbsp;</td>
            <td>&#160;</td>
        </tr>
        <tr>
            
            <td>less than</td>
            <td>&lt;</td>
            <td>&#60;</td>
        </tr>
        <tr>
            <td>greater than</td>
            <td>&gt;</td>
            <td>&#62;</td>
        </tr>
        <tr>
            <td>ampersand</td>
            <td>&amp;</td>
            <td>&#38;</td>
            
        </tr>
        <tr>
            
            <td>double quotation mark</td>
            <td>&quot;</td>
            <td>&#34;</td>
        </tr>
        <tr>
            
            <td>single quotation mark</td>
            <td>&apos;</td>
            <td>&#39;</td>
        </tr>
        <tr>
            
            <td>cent</td>
            <td>&cent;</td>
            <td>&#162;</td>
        </tr>
        <tr>
            
            <td>pound</td>
            <td>&pound;</td>
            <td>&#163;</td>
        </tr>
        <tr>
            
            <td>yen</td>
            <td>&yen;</td>
            <td>&#165;</td>
        </tr>
        <tr>
            
            <td>euro</td>
            <td>&euro;</td>
            <td>&#8364;</td>
        </tr>
        <tr>
            
            <td>copyright</td>
            <td>&copy;</td>
            <td>&#169;</td>
        </tr>
        <tr>
            
            <td>registered trademark</td>
            <td>&reg;</td>
            <td>&#174;</td>
        </tr>
        <tr>
            <td>trademark</td>
            <td>&trade;</td>
            <td>&#8482;</td>
        </tr>
    </table>

</body>

</html>
