<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formatting Elements</title>
</head>
<body>
    <p>this is <b>bold</b> text</p>
    <p> this is the <strong>strong</strong> text</p>

    <p>this is <i>italic</i> text</p>
    <p>this is the <em>emphasized</em> text</p>

    <p>Do't forgot to buy <mark>milks</mark></p>

    <p><small>This is small text</small></p>

    <p><s>This course is no longer available.</s></p>

    <p>This feature was <del>removed from the system</del>.</p>

    <p><ins>This feature was added to the system</ins>.</p>

    <!-- SuperScript-->
     <p>2<sup>5</sup></sub></p>

     <!-- SubScript -->
      <p>O<sub>2</sub></p>
</body>
</html>
